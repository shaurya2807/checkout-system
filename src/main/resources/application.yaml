spring:
  application:
    name: checkout-system

  datasource:
    url: jdbc:postgresql://localhost:5432/checkoutdb?assumeMinServerVersion=9.0&ApplicationName=checkout&options=-c+TimeZone=UTC
    username: checkout_user
    password: checkout_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET TIME ZONE 'UTC'

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

aws:
  region: us-east-1
  sqs:
    endpoint: http://localhost:4566
    queue-url: http://localhost:4566/000000000000/payment-events

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.checkout: DEBUG
    org.springframework.web: INFO
